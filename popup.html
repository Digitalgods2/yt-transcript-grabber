<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YT Transcript</title>
    <style>
      body {
        font-family: "Segoe UI", Roboto, sans-serif;
        width: 320px;
        margin: 0;
        padding: 14px;
        background: #1f1f1f;
        color: #eee;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 12px;
      }
      h1 {
        font-size: 14px;
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.1px;
      }
      .footer {
        margin-top: 10px;
        font-size: 11px;
        color: #888;
        text-align: center;
      }
      .row {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #ccc;
      }
      button {
        flex: 1;
        background: #cc0000;
        color: #fff;
        border: 0;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary {
        background: #333;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        font-size: 12px;
        color: #9ecbff;
        min-height: 16px;
        margin-top: 6px;
        white-space: pre-wrap;
      }
      textarea {
        width: 100%;
        height: 160px;
        box-sizing: border-box;
        background: #111;
        color: #eee;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 6px;
        font-size: 11px;
        font-family: ui-monospace, Consolas, monospace;
        resize: vertical;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="icons/icon32.png" alt="" width="24" height="24" />
      <h1>YT Transcript Grabber</h1>
    </div>
    <div class="row">
      <label><input type="checkbox" id="timestamps" /> Include timestamps</label>
    </div>
    <div class="row">
      <button id="grab">Grab &amp; Copy</button>
      <button id="download" class="secondary">Download .txt</button>
    </div>
    <div id="status"></div>
    <textarea id="preview" placeholder="Transcript will appear here..." readonly></textarea>
    <div class="footer">
      Open a YouTube video, then click <b>Grab &amp; Copy</b>.
      <div style="margin-top:6px;color:#666;">&copy; 2026 DigitalGods. All rights reserved.</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
